<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lions Network">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Offline | Lions Business Network</title>
  <link rel="icon" type="image/png" href="/img/hero-lion.png">
  <link rel="apple-touch-icon" href="/img/hero-lion.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="ambient-orb ambient-orb--left"></div>
  <div class="ambient-orb ambient-orb--right"></div>
  <main class="screen screen--auth">
    <section class="auth-layout">
      <article class="glass-card auth-panel">
        <div class="brand">
          <p class="eyebrow">Modo offline</p>
          <h1 class="brand-title">Sem conexão com a rede</h1>
          <p class="brand-subtitle">Reconecte-se para sincronizar empresas, ofertas e seu plano em tempo real.</p>
        </div>
      </article>
      <article class="glass-card glass-card--glow auth-panel">
        <div class="brand brand--center">
          <div class="brand-badge">
            <img src="/img/hero-lion.png" alt="Lions Business Network">
          </div>
          <h2 class="section-title">Você está offline</h2>
          <p class="helper-text">Quando a internet voltar, a navegação será restaurada automaticamente.</p>
          <a class="button" href="/index.html">Tentar novamente</a>
        </div>
      </article>
    </section>
  </main>
  <script type="module" src="/js/pwa.js"></script>
</body>
</html>
