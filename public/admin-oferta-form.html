<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0a">
  <title>Oferta | Admin Lions</title>
  <link rel="icon" type="image/png" href="/img/hero-lion.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="ambient-orb ambient-orb--left"></div>
  <div class="ambient-orb ambient-orb--right"></div>
  <main class="screen app-shell">
    <header id="admin-topbar"></header>
    <main class="page-stack">
      <section class="page-head">
        <div>
          <h1 id="form-title" class="page-title">Nova Oferta</h1>
          <p class="page-subtitle">Preencha os dados da oferta ou promoção.</p>
        </div>
        <a class="button button--ghost" href="/admin-ofertas.html">Voltar</a>
      </section>

      <div id="status-msg" class="status"></div>

      <form id="offer-form" class="page-stack" novalidate>
        <div class="glass-card form-section">
          <p class="form-section__title">Informações da oferta</p>
          <div class="admin-form">
            <div class="field">
              <label class="field-label" for="f-title">Título da oferta *</label>
              <input id="f-title" class="field-input" type="text" placeholder="Ex: 20% OFF em consultorias" required>
            </div>
            <div class="field">
              <label class="field-label" for="f-company">Empresa vinculada *</label>
              <select id="f-company" class="field-select" required>
                <option value="">Carregando empresas...</option>
              </select>
            </div>
            <div class="field">
              <label class="field-label" for="f-description">Descrição</label>
              <textarea id="f-description" class="field-textarea" placeholder="Descreva os detalhes da oferta..."></textarea>
            </div>
            <div class="field">
              <label class="field-label" for="f-discount">Desconto (%) *</label>
              <input id="f-discount" class="field-input" type="number" min="0" max="100" placeholder="Ex: 20" required>
            </div>
          </div>
        </div>

        <div class="glass-card form-section">
          <p class="form-section__title">Período e status</p>
          <div class="admin-form admin-form-grid">
            <div class="field">
              <label class="field-label" for="f-starts">Data de início</label>
              <input id="f-starts" class="field-input" type="date">
            </div>
            <div class="field">
              <label class="field-label" for="f-expires">Data de validade</label>
              <input id="f-expires" class="field-input" type="date">
            </div>
          </div>
          <div class="toggle-field">
            <span class="toggle-label">Oferta ativa</span>
            <label class="toggle-switch">
              <input id="f-status" type="checkbox" checked>
              <span class="toggle-track"></span>
            </label>
          </div>
        </div>

        <div class="button-row">
          <button id="btn-save" class="button" type="submit">Salvar oferta</button>
          <button id="btn-delete" class="button button--danger hidden" type="button">Excluir oferta</button>
        </div>
      </form>
    </main>
    <nav id="admin-nav" class="bottom-nav" aria-label="Navegação admin"></nav>
  </main>
  <div id="confirm-modal" class="confirm-overlay hidden"></div>
  <script type="module" src="/js/pages/admin-offer-form.js"></script>
</body>
</html>
