<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lions Network">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Ofertas | Lions Business Network</title>
  <link rel="icon" type="image/png" href="/img/hero-lion.png">
  <link rel="apple-touch-icon" href="/img/hero-lion.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="ambient-orb ambient-orb--left"></div>
  <div class="ambient-orb ambient-orb--right"></div>
  <main class="screen app-shell">
    <header id="topbar" class="topbar"></header>
    <main class="page-stack">
      <section class="page-head">
        <div>
          <h1 class="page-title">Ofertas ativas</h1>
          <p class="page-subtitle">Confira todas as promoções em vigor para associados da rede Lions.</p>
        </div>
      </section>
      <section class="glass-card section-card">
        <div class="search-row">
          <div id="offers-categories" class="chip-row"></div>
        </div>
      </section>
      <section id="offers-list" class="offers-grid"></section>
    </main>
    <nav id="bottom-nav" class="bottom-nav" aria-label="Navegação principal"></nav>
  </main>
  <script type="module" src="/js/pwa.js"></script>
  <script type="module" src="/js/pages/offers.js"></script>
</body>
</html>
