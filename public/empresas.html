<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#070a08">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Lions Network">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="/manifest.webmanifest">
  <title>Empresas | Lions Business Network</title>
  <link rel="icon" type="image/png" href="/img/hero-lion.png">
  <link rel="apple-touch-icon" href="/img/hero-lion.png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="ambient-orb ambient-orb--left"></div>
  <main class="screen app-shell">
    <header id="topbar" class="topbar"></header>
    <main class="page-stack">
      <section class="page-head">
        <div>
          <h1 class="page-title">Empresas</h1>
          <p class="page-subtitle">Descubra parceiros e fale diretamente via WhatsApp.</p>
        </div>
      </section>
      <section class="glass-card section-card">
        <div class="search-row">
          <input id="company-search" class="search-input" type="search" placeholder="Buscar empresa...">
          <div class="utility-row">
            <button id="company-search-button" class="button button--ghost" type="button">Buscar</button>
            <button id="company-reset-button" class="button button--ghost" type="button">Limpar</button>
          </div>
        </div>
        <div id="company-categories" class="chip-row"></div>
      </section>
      <section id="companies-list" class="card-grid"></section>
    </main>
    <nav id="bottom-nav" class="bottom-nav" aria-label="Navegação principal"></nav>
  </main>
  <script type="module" src="/js/pwa.js"></script>
  <script type="module" src="/js/pages/companies.js"></script>
</body>
</html>
